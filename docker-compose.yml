services:
  redis:
    image: redis:7

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    command: ["celery", "-A", "src.tasks.celery_app.celery_app", "worker", "--loglevel=INFO"]
    depends_on:
      - redis
